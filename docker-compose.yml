services:
  web:
    # TODO(step-5a)
    build: .
    ports:
      - "3000:3000"

    # TODO(step-5b)
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/workshop

    # TODO(step-5c)
    depends_on:
      db:
        condition: service_healthy

  db:
    # TODO(step-5d)
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workshop"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

    volumes:
      # TODO(step-5e)
      - pgdata:/var/lib/postgresql/data
      # TODO(step-5g)
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    # TODO(step-5f)
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshop

# TODO(step-5h)
volumes:
  pgdata: